# fly.toml app configuration file generated for boomerbill-api on 2026-03-22T04:02:01-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'boomerbill-api'
primary_region = 'iad'
console_command = 'python /app/core/manage.py shell'

[build]

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/app/core/static'
  url_prefix = '/static/'
